<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }

  /* ====== Нова палітра — bold flat, референс sajon.co ====== */
  :root {
    --bg: #f2f0ed;
    --bg-2: #eae7e1;
    --surface: #ffffff;
    --ink: #1c1a17;
    --ink-soft: #5a564f;
    --ink-faded: #8a857d;
    --accent: #1c1a17;

    /* Насичені плашки за сенсом (need / want / save) */
    --need-bg:     #e9e4f5;   /* lavender */
    --need-line:   rgba(60,52,137,0.14);
    --need-line-2: rgba(60,52,137,0.26);
    --need-title:  #3c3489;
    --need-text:   #26215c;

    --want-bg:     #f3d9e1;   /* dusty rose */
    --want-line:   rgba(153,53,86,0.14);
    --want-line-2: rgba(153,53,86,0.26);
    --want-title:  #993556;
    --want-text:   #72243e;

    --save-bg:     #dcebd4;   /* sage */
    --save-line:   rgba(59,109,17,0.14);
    --save-line-2: rgba(59,109,17,0.26);
    --save-title:  #3b6d11;
    --save-text:   #27500a;

    /* Старі пастелі лишаємо як запасні (квитки/інше можуть посилатися) */
    --pastel-cream:    #ffffff;
    --pastel-peach:    #f7ece6;
    --pastel-sage:     #e8f0e2;
    --pastel-lavender: #ece8f6;
    --pastel-rose:     #f7e6ec;
    --pastel-sky:      #e6eef5;
    --pastel-butter:   #f7eed6;
    --pastel-mint:     #e4f1ea;

    --border-cream:    rgba(28,26,23,0.08);
    --border-peach:    rgba(28,26,23,0.08);
    --border-sage:     rgba(28,26,23,0.08);
    --border-lavender: rgba(28,26,23,0.08);
    --border-rose:     rgba(28,26,23,0.08);
    --border-sky:      rgba(28,26,23,0.08);
    --border-butter:   rgba(28,26,23,0.08);
    --border-mint:     rgba(28,26,23,0.08);

    --r-sm: 12px;
    --r-md: 18px;
    --r-lg: 24px;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv01','cv03','tnum';
  }
  ul { list-style: none; padding: 0; margin: 0; }
  h1, h2, h3, p { margin: 0; }
  button { font-family: inherit; }

  .container { max-width: 48rem; width: 100%; margin: 0 auto; padding: 1.25rem 1rem 3rem; overflow-x: hidden; }
  @media (min-width: 768px) { .container { padding: 2.5rem 1.5rem; } }

  /* ====== Header ====== */
  .header {
    margin-bottom: 1.25rem;
    padding-bottom: 0;
    border-bottom: none;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 0.35rem;
    font-weight: 500;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 9vw, 2.75rem);
    line-height: 0.98;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  @media (min-width: 768px) { .title { font-size: 3.25rem; } }
  .title em { font-weight: 800; font-style: normal; color: var(--ink-faded); }
  .header-controls { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

  /* ====== Cards ====== */
  .card {
    background: var(--surface);
    border: none;
    border-radius: var(--r-lg);
    padding: 1.1rem 1.15rem;
    transition: none;
    overflow: hidden;
    min-width: 0;
  }
  .card-lg { padding: 1.35rem 1.25rem; }

  /* старі декоративні класи -> нейтральна біла картка */
  .card-c-cream, .card-c-peach, .card-c-butter, .card-c-sage,
  .card-c-mint, .card-c-sky, .card-c-lavender, .card-c-rose {
    background: var(--surface);
    border: none;
  }

  /* ====== Насичені плашки категорій за kind ====== */
  .cat-need { background: var(--need-bg); border: none; border-radius: var(--r-lg); padding: 1.1rem 1.15rem; color: var(--need-text); }
  .cat-want { background: var(--want-bg); border: none; border-radius: var(--r-lg); padding: 1.1rem 1.15rem; color: var(--want-text); }
  .cat-save { background: var(--save-bg); border: none; border-radius: var(--r-lg); padding: 1.1rem 1.15rem; color: var(--save-text); }

  .cat-need .card-title, .cat-need .card-emoji { color: var(--need-title); }
  .cat-want .card-title, .cat-want .card-emoji { color: var(--want-title); }
  .cat-save .card-title, .cat-save .card-emoji { color: var(--save-title); }

  .cat-need .card-title { caret-color: var(--need-title); }
  .cat-want .card-title { caret-color: var(--want-title); }
  .cat-save .card-title { caret-color: var(--save-title); }

  .cat-need .row-label-input { color: var(--need-text); caret-color: var(--need-title); }
  .cat-want .row-label-input { color: var(--want-text); caret-color: var(--want-title); }
  .cat-save .row-label-input { color: var(--save-text); caret-color: var(--save-title); }

  .cat-need .num-input { color: var(--need-text); border-bottom-color: var(--need-line-2); }
  .cat-want .num-input { color: var(--want-text); border-bottom-color: var(--want-line-2); }
  .cat-save .num-input { color: var(--save-text); border-bottom-color: var(--save-line-2); }
  .cat-need .num-input:focus, .cat-want .num-input:focus, .cat-save .num-input:focus { background: rgba(255,255,255,0.45); }

  .cat-need .row-unit { color: var(--need-title); }
  .cat-want .row-unit { color: var(--want-title); }
  .cat-save .row-unit { color: var(--save-title); }

  .cat-need .card-total { border-top-color: var(--need-line-2); }
  .cat-want .card-total { border-top-color: var(--want-line-2); }
  .cat-save .card-total { border-top-color: var(--save-line-2); }
  .cat-need .card-total-label { color: var(--need-title); }
  .cat-want .card-total-label { color: var(--want-title); }
  .cat-save .card-total-label { color: var(--save-title); }
  .cat-need .card-total-value, .cat-need .card-pct { color: var(--need-text); }
  .cat-want .card-total-value, .cat-want .card-pct { color: var(--want-text); }
  .cat-save .card-total-value, .cat-save .card-pct { color: var(--save-text); }

  /* кнопка "+ додати статтю" всередині кольорової плашки — помітніша */
  .cat-need .btn-add { border-color: var(--need-line-2); color: var(--need-title); background: rgba(255,255,255,0.4); }
  .cat-want .btn-add { border-color: var(--want-line-2); color: var(--want-title); background: rgba(255,255,255,0.4); }
  .cat-save .btn-add { border-color: var(--save-line-2); color: var(--save-title); background: rgba(255,255,255,0.4); }
  .cat-need .btn-add:hover { background: rgba(255,255,255,0.75); border-color: var(--need-title); color: var(--need-title); }
  .cat-want .btn-add:hover { background: rgba(255,255,255,0.75); border-color: var(--want-title); color: var(--want-title); }
  .cat-save .btn-add:hover { background: rgba(255,255,255,0.75); border-color: var(--save-title); color: var(--save-title); }

  .cat-need .btn-icon { color: var(--need-title); }
  .cat-want .btn-icon { color: var(--want-title); }
  .cat-save .btn-icon { color: var(--save-title); }
  .cat-need .empty, .cat-want .empty, .cat-save .empty { color: inherit; opacity: 0.65; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.85rem;
  }
  .card-header-left { display: flex; align-items: center; gap: 0.55rem; flex: 1; min-width: 0; }
  .card-emoji {
    font-size: 1.15rem;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
    line-height: 1;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .card-emoji:hover { background: rgba(0, 0, 0, 0.06); }
  .card-title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed transparent;
    padding: 2px 4px;
    outline: none;
    flex: 1;
    min-width: 0;
  }
  .card-title:focus, .card-title:hover { border-bottom-color: currentColor; }
  .card-total {
    margin-top: 0.85rem;
    padding-top: 0.85rem;
    border-top: 1.5px solid rgba(28,26,23,0.12);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .card-total-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faded); font-weight: 500; }
  .card-total-value { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.4rem; letter-spacing: -0.02em; color: var(--ink); }

  /* ====== Tickets — у новому стилі, без вирізів-кружків ====== */
  .ticket {
    position: relative;
    background: var(--surface);
    border: none;
    border-radius: var(--r-lg);
    padding: 1.15rem 1.2rem;
  }
  .ticket::before, .ticket::after { content: none; }

  .ticket-c-cream    { background: var(--surface); }
  .ticket-c-peach    { background: var(--want-bg); }
  .ticket-c-sage     { background: var(--save-bg); }
  .ticket-c-lavender { background: var(--need-bg); }
  .ticket-c-rose     { background: var(--want-bg); }
  .ticket-c-sky      { background: #e6eef5; }
  .ticket-c-butter   { background: #f7eed6; }
  .ticket-c-mint     { background: var(--save-bg); }

  .ticket-eyebrow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }
  .ticket-eyebrow-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-faded);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
  }
  .ticket-emoji {
    font-size: 1.05rem;
    cursor: pointer;
    user-select: none;
    line-height: 1;
    padding: 4px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .ticket-emoji:hover { background: rgba(0, 0, 0, 0.06); }
  .ticket-title-input {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: -0.01em;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed transparent;
    padding: 2px 4px;
    outline: none;
    width: 100%;
    margin-bottom: 0.25rem;
  }
  .ticket-title-input:focus, .ticket-title-input:hover { border-bottom-color: var(--ink-soft); }
  .ticket-sub-input {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed transparent;
    padding: 2px 4px;
    outline: none;
    width: 100%;
    margin-bottom: 0.75rem;
  }
  .ticket-sub-input:focus, .ticket-sub-input:hover { border-bottom-color: var(--ink-soft); }
  .ticket-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-top: 1.5px solid rgba(28,26,23,0.12);
    padding-top: 0.85rem;
  }
  .ticket-amount { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.65rem; letter-spacing: -0.02em; color: var(--ink); }
  .ticket-amount-warn { color: #c0392b; }

  .ticket-config {
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1.5px solid rgba(28,26,23,0.1);
    font-size: 0.72rem;
    color: var(--ink-soft);
  }
  .ticket-config-summary {
    cursor: pointer;
    user-select: none;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-weight: 500;
  }
  .ticket-config-summary::-webkit-details-marker { display: none; }
  .ticket-config-summary::before {
    content: "▸";
    font-size: 0.8rem;
    transition: transform 0.15s;
  }
  details[open] .ticket-config-summary::before { transform: rotate(90deg); }
  .ticket-config-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }

  /* ====== Rows ====== */
  .row { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-top: 0.5rem; min-width: 0; }
  .row-label-input {
    font-family: 'Inter', sans-serif;
    font-size: 0.92rem;
    line-height: 1.4;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed transparent;
    padding: 4px 4px;
    outline: none;
    flex: 1 1 0;
    min-width: 0;
    resize: none;
    overflow: hidden;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .row-label-input:focus, .row-label-input:hover { border-bottom-color: currentColor; }
  .row-input-wrap { display: flex; align-items: baseline; gap: 0.4rem; flex-shrink: 0; min-width: 0; padding-top: 2px; }
  .row-unit { font-size: 0.75rem; color: var(--ink-soft); min-width: 1.2rem; font-weight: 500; flex-shrink: 0; }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  .num-input {
    background: transparent;
    border: none;
    border-bottom: 1.5px dashed var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    padding: 4px 4px;
    width: 100%;
    max-width: 110px;
    min-width: 0;
    text-align: right;
    color: var(--ink);
    outline: none;
    transition: all 0.2s;
  }
  .num-input:focus { border-bottom: 1.5px solid var(--accent); background: rgba(28,26,23,0.04); }
  .num-input::placeholder { color: var(--ink-faded); opacity: 0.5; }
  .num-input-sm { max-width: 80px; }

  select {
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--ink);
    padding: 0.25rem 0.5rem;
    outline: none;
    cursor: pointer;
    color: var(--ink);
  }

  /* ====== Income ====== */
  .income-section { margin-bottom: 1.25rem; }
  .income-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
  .income-label { display: flex; align-items: center; gap: 0.6rem; }
  .income-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: -0.01em; color: var(--ink); }
  .income-input {
    font-family: 'Inter', sans-serif !important;
    font-weight: 800 !important;
    font-size: 2rem !important;
    letter-spacing: -0.02em !important;
    width: 100% !important;
    max-width: 200px !important;
    border-bottom-style: solid !important;
    border-bottom-color: rgba(28,26,23,0.15) !important;
  }

  .main-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
  @media (min-width: 768px) { .main-grid { gap: 1.5rem; } }
  .col-stack { display: flex; flex-direction: column; gap: 0.85rem; min-width: 0; }
  .col-section-title {
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 0.1rem;
    padding-left: 0.25rem;
  }

  /* ====== Summary ====== */
  .summary {
    background: var(--surface);
    border: none;
    border-radius: var(--r-lg);
    padding: 1.35rem 1.25rem;
    margin-bottom: 1rem;
  }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; text-align: center; }
  .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faded); margin-bottom: 0.3rem; font-weight: 500; }
  .stat-value { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: -0.02em; color: var(--ink); }
  .stat-value-red { color: #c0392b; }
  .stat-value-green { color: #3b6d11; }
  .stat-unit { font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--ink-faded); }

  /* ====== Kind badge ====== */
  .card-pct { font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500; color: var(--ink-faded); margin-left: 0.5rem; }

  .kind-badge {
    font-family: 'Inter', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 0.22rem 0.6rem;
    border-radius: 9999px;
    white-space: nowrap;
    margin-left: 0.4rem;
    border: none;
    flex-shrink: 0;
  }
  .kind-badge-need { background: rgba(60,52,137,0.14); color: var(--need-title); }
  .kind-badge-want { background: rgba(153,53,86,0.14); color: var(--want-title); }
  .kind-badge-save { background: rgba(59,109,17,0.14); color: var(--save-title); }

  /* ====== Rec row ====== */
  .rec-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.5rem;
    margin-top: 0.6rem;
    padding: 0.5rem 0.7rem;
    border-radius: var(--r-sm);
    font-size: 0.72rem;
    background: rgba(255,255,255,0.45);
    border: none;
  }
  .rec-label { color: var(--ink-faded); font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.03em; }
  .rec-value { font-family: 'Inter', sans-serif; font-weight: 700; color: var(--ink-soft); text-align: right; }
  .rec-over .rec-value { color: #b85a2b; }
  .rec-under .rec-value { color: #3b6d11; }
  .rec-ok .rec-value { color: var(--ink-soft); }

  /* ====== Hold row ====== */
  .hold-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.6rem;
    padding: 0.6rem 0.75rem;
    border-radius: var(--r-sm);
    background: rgba(255,255,255,0.5);
    border: none;
  }
  .hold-emoji { font-size: 1rem; flex-shrink: 0; }
  .hold-input {
    flex: 1; min-width: 0;
    appearance: none; border: none; background: transparent;
    font-family: 'Inter', sans-serif; font-size: 0.8rem; color: var(--ink-soft);
    border-bottom: 1px dashed transparent; padding: 0.15rem 0;
  }
  .hold-input::placeholder { color: var(--ink-faded); opacity: 0.7; }
  .hold-input:focus, .hold-input:hover { border-bottom-color: var(--ink-soft); outline: none; }
  .hold-amount { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--ink); flex-shrink: 0; }

  /* ====== Split 50/30/20 ====== */
  .split-inline {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1.5px solid rgba(28,26,23,0.1);
  }
  .split-inline-title { font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faded); margin: 0 0 0.4rem; }
  .split-inline-sub { font-size: 0.82rem; color: var(--ink-soft); line-height: 1.55; margin: 0 0 1rem; }
  .split-inline-sub b { color: var(--ink); font-weight: 600; }
  .split-card {
    background: var(--surface);
    border: none;
    border-radius: var(--r-lg);
    padding: 1.35rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .split-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.15rem; letter-spacing: -0.01em; color: var(--ink); margin: 0 0 0.25rem; }
  .split-sub { font-size: 0.8rem; color: var(--ink-faded); margin: 0 0 1rem; }
  .split-bar { display: flex; height: 1.5rem; border-radius: 9999px; overflow: hidden; background: rgba(28,26,23,0.08); margin-bottom: 1rem; }
  .split-seg { transition: width 0.4s ease; min-width: 0; }
  .split-seg-need { background: #7f77dd; }
  .split-seg-want { background: #d4537e; }
  .split-seg-save { background: #639922; }
  .split-legend { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
  .split-item { text-align: left; }
  .split-item-top { display: flex; align-items: baseline; gap: 0.4rem; }
  .split-dot { width: 0.7rem; height: 0.7rem; border-radius: 50%; flex-shrink: 0; }
  .split-dot-need { background: #7f77dd; }
  .split-dot-want { background: #d4537e; }
  .split-dot-save { background: #639922; }
  .split-name { font-size: 0.75rem; color: var(--ink-soft); }
  .split-pct { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em; color: var(--ink); }
  .split-target { font-family: 'Inter', sans-serif; font-size: 0.66rem; color: var(--ink-faded); }
  .split-amount { font-size: 0.72rem; color: var(--ink-faded); }
  .split-hint {
    margin: 1rem 0 0;
    padding: 0.7rem 0.9rem;
    border-radius: var(--r-sm);
    background: rgba(99,153,34,0.14);
    border: none;
    font-size: 0.8rem;
    color: var(--ink-soft);
  }
  .split-hint-warn { background: rgba(212,83,126,0.14); }

  /* ====== Goals ====== */
  .goal {
    border: none;
    background: var(--surface);
    border-radius: var(--r-md);
    padding: 1.1rem 1.15rem;
    margin-bottom: 0.85rem;
    overflow: hidden;
    min-width: 0;
  }
  .goal-title-input { min-width: 0; }
  .goal-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
  .goal-emoji { font-size: 1.3rem; cursor: pointer; }
  .goal-title-input {
    flex: 1; appearance: none; border: none; background: transparent;
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: -0.01em; color: var(--ink);
    border-bottom: 1.5px dashed transparent; padding: 0.1rem 0;
  }
  .goal-title-input:focus, .goal-title-input:hover { border-bottom-color: var(--ink-soft); outline: none; }
  .goal-progress-track { height: 0.7rem; border-radius: 9999px; background: rgba(28,26,23,0.08); overflow: hidden; margin: 0.5rem 0 0.4rem; }
  .goal-progress-fill { height: 100%; border-radius: 9999px; transition: width 0.4s ease; background: #639922; }
  .goal-progress-fill.done { background: #3b6d11; }
  .goal-meta { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--ink-faded); margin-bottom: 0.75rem; }
  .goal-meta strong { color: var(--ink); font-family: 'Inter', sans-serif; font-weight: 700; }
  .goal-fields { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.5rem; }
  .goal-field { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
  .goal-field .num-input { max-width: none; text-align: left; }
  .goal-field label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-faded); font-weight: 500; }
  .goal-eta { font-size: 0.72rem; color: var(--ink-soft); margin-top: 0.5rem; }

  /* ====== Actions / buttons ====== */
  .actions { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; padding-bottom: 2.5rem; }
  .btn-group { display: flex; gap: 0.6rem; flex-wrap: wrap; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    min-height: 44px;
    padding: 0.7rem 1.3rem;
    border-radius: 9999px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    border: 1.5px solid transparent;
  }
  .btn-primary { background: var(--ink); color: #fafaf9; }
  .btn-primary:hover { background: #000; }
  .btn-secondary { background: var(--surface); color: var(--ink); border-color: rgba(28,26,23,0.15); }
  .btn-secondary:hover { background: var(--bg-2); border-color: rgba(28,26,23,0.3); }
  .btn-mini {
    min-height: 36px;
    padding: 0.4rem 0.85rem;
    font-size: 0.78rem;
    font-weight: 600;
    background: var(--surface);
    color: var(--ink-soft);
    border: 1.5px solid rgba(28,26,23,0.15);
    border-radius: 9999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    transition: all 0.15s;
  }
  .btn-mini:hover { background: var(--ink); color: #fafaf9; border-color: var(--ink); }

  /* ====== Шестерня + випадне меню ====== */
  .menu-wrap { position: relative; }
  .btn-gear {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: var(--surface);
    border: 1.5px solid rgba(28,26,23,0.15);
    border-radius: 50%;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-gear:hover { background: var(--bg-2); border-color: rgba(28,26,23,0.3); }
  .menu-overlay { position: fixed; inset: 0; z-index: 40; }
  .menu-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    z-index: 50;
    background: var(--surface);
    border-radius: var(--r-md);
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    padding: 6px;
    min-width: 200px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
    min-height: 44px;
    padding: 0.6rem 0.8rem;
    background: transparent;
    border: none;
    border-radius: var(--r-sm);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: left;

  };
}
